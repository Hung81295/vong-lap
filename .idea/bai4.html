<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>bài 4</title>
</head>
<body>
<script>
  let n = Number(prompt("Nhập số n vào đây"));
  let ketQua =0;
  for (let i = 0; i <= n; i++) {
    ketQua += i * (i + 1);//thay cho cách viết ketQua=ketQua +i*(i+1)
  }
  document.write(`Với n = ${n}, giá trị biểu thức S là: ${ketQua}`);
</script>
</body>
</html>
