<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>bài 2</title>
</head>
<body>
<script>
  let cau = prompt("Nhập 1 câu bất kỳ");
  if (!cau || cau.trim() === "") {
    document.write("Bạn chưa nhập gì cả")
  } else {
    cau = cau.trim();
    let soKyTu = 0;
    let soTu = cau.trim().split(/\s+/).length;
    for (let i = 0; i < cau.length; i++) {
      soKyTu++;
    }
    //if (cau.length > 0) {
    //soTu = 1; không cần đoạn này do dùng   let soTu = cau.trim().split(/\s+/).length;
    //}

    //if (cau[i] === " " && cau[i + 1] !== " ") {
    // soTu++
    // }
    // }
    document.write(`Câu đã nhập: ${cau} <br>`);
    document.write(`Số từ: ${soTu}<br>`);
    document.write(`Số ký tự: ${soKyTu}`);
  }
</script>
</body>
</html>
